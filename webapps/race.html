<!doctype html>
<html lang="en" class="h-full">

  <style>
    :root {
      --mystic-purple: #A855F7;
      --emerald-green: #6BCB77;
      --gold: #FFD93D;
      --crimson: #EC4899;
    }
    body { font-family: 'Quicksand', sans-serif; }
    .fantasy-title { font-family: 'Cinzel', serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 5px var(--mystic-purple)); }
      50% { filter: drop-shadow(0 0 20px var(--mystic-purple)); }
    }
    @keyframes sparkle {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.5) rotate(180deg); opacity: 0.5; }
      100% { transform: scale(1) rotate(360deg); opacity: 1; }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100%) rotate(720deg); opacity: 0; }
    }
    @keyframes bounce-in {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes sad-fade {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px var(--gold); }
      50% { box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold); }
    }
    
    .floating { animation: float 3s ease-in-out infinite; }
    .glowing { animation: glow 2s ease-in-out infinite; }
    .sparkle-burst { animation: sparkle 0.5s ease-out; }
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .sad-fade { animation: sad-fade 0.5s ease-out; }
    .pulse-glow { animation: pulse-glow 1s ease-in-out infinite; }
    
    .mushroom {
      position: absolute;
      animation: float 4s ease-in-out infinite;
    }
    
    .track-step {
      transition: all 0.3s ease;
    }
    .track-step:hover {
      transform: scale(1.1);
    }
    
    .power-up {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .power-up:hover:not(.used):not(.locked) {
      transform: scale(1.15);
    }
    .power-up.locked {
      filter: grayscale(100%);
      opacity: 0.5;
    }
    .power-up.used {
      filter: grayscale(100%);
      opacity: 0.3;
    }
    
    .option-btn {
      transition: all 0.2s ease;
    }
    .option-btn:hover {
      transform: translateX(5px);
    }
    
    .team-buzzer {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .team-buzzer:hover {
      transform: scale(1.05);
    }
    .team-buzzer.selected {
      ring: 4px solid var(--gold);
    }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear forwards;
    }
    
    .forest-bg {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    
    .scrollbar-fantasy::-webkit-scrollbar {
      width: 8px;
    }
    .scrollbar-fantasy::-webkit-scrollbar-track {

      border-radius: 4px;
    }
    .scrollbar-fantasy::-webkit-scrollbar-thumb {
      background: var(--mystic-purple);
      border-radius: 4px;
    }

    // ===== AIKEN PARSER =====
    function parseAIKEN(text) {
      const questions = [];
      const blocks = text.trim().split(/\n\n+/);
      
      for (const block of blocks) {
        const lines = block.trim().split('\n').filter(l => l.trim());
        if (lines.length < 3) continue;
        
        const questionText = lines[0].trim();
        const options = [];
        let answer = '';
        
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          const optionMatch = line.match(/^([A-Z])[.)]\s*(.+)/i);
          const answerMatch = line.match(/^ANSWER:\s*([A-Z])/i);
          
          if (optionMatch) {
            options.push({ letter: optionMatch[1].toUpperCase(), text: optionMatch[2] });
          } else if (answerMatch) {
            answer = answerMatch[1].toUpperCase();
          }
        }
        
        if (questionText && options.length >= 2 && answer) {
          questions.push({ question: questionText, options, answer });
        }
      }
      
      return questions;
    }

        { question: "\"Don't open that cursed book!\" shouted the librarian. Indirect:", options: [{letter: 'A', text: 'The librarian shouted not to open that cursed book'}, {letter: 'B', text: 'The librarian shouted don\'t open that cursed book'}, {letter: 'C', text: 'The librarian said to not open cursed book'}, {letter: 'D', text: 'The librarian shouts not opening that cursed book'}], answer: 'A' },

    // ===== RENDER FUNCTIONS =====
    function render() {
      const app = document.getElementById('app');
      switch (gameState.screen) {
        case 'tutorial':
          app.innerHTML = renderTutorialScreen();
          break;
        case 'import':
          app.innerHTML = renderImportScreen();
          break;
        case 'powerups':
          app.innerHTML = renderPowerUpsScreen();
          break;
        case 'setup':
          app.innerHTML = renderSetupScreen();
          break;
        case 'game':
          app.innerHTML = renderGameScreen();
          break;
        case 'victory':
          app.innerHTML = renderVictoryScreen();
          break;
      }
      
      attachEventListeners();
    }

    function getTriggerDescription(trigger) {
      const descriptions = {
        'fastest3': 'Answer fastest 3 times',
        'streak3': 'Get 3 correct in a row',
        'correct5': 'Get 5 total correct',
        'winRound': 'Win a round (most correct)',
        'hard3': 'Answer 3 hard questions',
        'fastest5': 'Answer fastest 5 times'
      };
      return descriptions[trigger] || trigger;
    }

    function getRoundEmoji(index) {
      return ['🏰', '💬', '🌟', '🔗', '📖'][index] || '❓';
    }

    function getRoundDescription(index) {
      const descs = [
        `Questions 1-10`,
        `Questions 11-20`,
        `Questions 21-30`,
        `Questions 31-40`,
        `Questions 41-50`
      ];
      return descs[index] || '';
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return mins > 0 ? `${mins}:${secs.toString().padStart(2, '0')}` : `${secs}s`;
    }

    function generateBadges() {
      const badges = [];
      const teams = gameState.teams.slice(0, gameState.teamCount);
      
      const speedDemon = teams.reduce((best, t) => 
        (t.fastestCount || 0) > (best?.fastestCount || 0) ? t : best, null);
      if (speedDemon && speedDemon.fastestCount > 0) {
        badges.push({ team: speedDemon, title: 'Speed Demon ⚡', emoji: '⚡' });
      }
      
      const round1Champ = teams.reduce((best, t) => 
        (t.roundScores?.[0] || 0) > (best?.roundScores?.[0] || 0) ? t : best, null);
      if (round1Champ && (round1Champ.roundScores?.[0] || 0) > 0) {
        badges.push({ team: round1Champ, title: 'Round 1 Champion 🥇', emoji: '🥇' });
      }
      
      const round2Champ = teams.reduce((best, t) => 
        (t.roundScores?.[1] || 0) > (best?.roundScores?.[1] || 0) ? t : best, null);
      if (round2Champ && (round2Champ.roundScores?.[1] || 0) > 0) {
        badges.push({ team: round2Champ, title: 'Round 2 Champion 🥇', emoji: '🥇' });
      }
      
      const round3Champ = teams.reduce((best, t) => 
        (t.roundScores?.[2] || 0) > (best?.roundScores?.[2] || 0) ? t : best, null);
      if (round3Champ && (round3Champ.roundScores?.[2] || 0) > 0) {
        badges.push({ team: round3Champ, title: 'Round 3 Champion 🥇', emoji: '🥇' });
      }
      
      const powerPlayer = teams.reduce((best, t) => 
        (t.powerUps?.length || 0) > (best?.powerUps?.length || 0) ? t : best, null);
      if (powerPlayer && (powerPlayer.powerUps?.length || 0) > 0) {
        badges.push({ team: powerPlayer, title: 'Power Player 💪', emoji: '💪' });
      }
      
      const comebackKid = teams.find(t => t.hadNegative && (t.position || 0) > 5);
      if (comebackKid) {
        badges.push({ team: comebackKid, title: 'Comeback Champion 🔥', emoji: '🔥' });
      }
      
      return badges;
    }

    function spawnConfetti() {
      const container = document.getElementById('confetti-container');
      if (!container) return;
      
      const colors = ['#A855F7', '#6BCB77', '#FFD93D', '#EC4899', '#3B82F6'];
      
      for (let i = 0; i < 100; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDelay = Math.random() * 2 + 's';
          container.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 3000);
        }, i * 30);
      }
    }

    function animateTeamMove(teamIndex, steps, isCorrect, isFastest) {
      const marker = document.querySelector(`.team-marker[data-team="${teamIndex}"]`);
      if (!marker) return;
      
      if (isFastest) {
        marker.classList.add('sparkle-burst');
        setTimeout(() => marker.classList.remove('sparkle-burst'), 500);
      } else if (isCorrect) {
        marker.classList.add('bounce-in');
        setTimeout(() => marker.classList.remove('bounce-in'), 500);
      } else {
        marker.classList.add('sad-fade');
        setTimeout(() => marker.classList.remove('sad-fade'), 500);
      }
    }

    function selectRandomTeam() {
      const availableTeams = gameState.teams.slice(0, gameState.teamCount)
        .map((team, i) => ({ index: i, team, answerCount: gameState.teamAnswerCount[i] || 0 }))
        .filter(t => !gameState.answeringTeams.includes(t.index))
        .sort((a, b) => a.answerCount - b.answerCount); 
      
      if (availableTeams.length === 0) return; 
      
      const minAnswerCount = availableTeams[0].answerCount;
      const teamsWithMinAnswers = availableTeams.filter(t => t.answerCount === minAnswerCount);
      
      const randomTeam = teamsWithMinAnswers[Math.floor(Math.random() * teamsWithMinAnswers.length)];
      gameState.selectedTeam = randomTeam.index;
      
      gameState.teamAnswerCount[randomTeam.index] = (gameState.teamAnswerCount[randomTeam.index] || 0) + 1;
      
      render();
    }

    // ===== GAME LOGIC =====
    function initializeTeams() {
      gameState.teams = Array.from({length: 10}, (_, i) => ({
        name: `Team ${i + 1}`,
        animal: animals[i % animals.length],
        color: colors[i % colors.length],
        position: 0,
        powerUps: [],
        usedPowerUps: [],
        activeEffects: [],
        correctAnswers: 0,
        wrongAnswers: 0,
        fastestCount: 0,
        streak: 0,
        roundScores: [0, 0, 0, 0, 0],
        hadNegative: false,
        hardCorrect: 0
      }));
    }

    function startTimer(isResuming = false) {
      clearInterval(gameState.timer);
      
      if (!isResuming) {
        gameState.timeLeft = gameState.timerDuration;
        
        if (gameState.selectedTeam !== null) {
          const team = gameState.teams[gameState.selectedTeam];
          if (team.activeTimeSpell) {
            gameState.timeLeft += 10;
            team.activeTimeSpell = false;
          }
        }
      }
      
      gameState.timer = setInterval(() => {
        gameState.timeLeft--;
        
        const timerEl = document.querySelector('.text-3xl.font-bold');
        if (timerEl) {
          timerEl.textContent = formatTime(gameState.timeLeft);
          timerEl.className = `text-3xl font-bold ${gameState.timeLeft <= 10 ? 'text-red-400 animate-pulse' : 'text-gold'}`;
        }
        
        if (gameState.timeLeft <= 0) {
          clearInterval(gameState.timer);
          handleTimeout();
        }
      }, 1000);
    }

    function handleTimeout() {
      if (gameState.selectedTeam !== null) {
        handleWrongAnswer(gameState.selectedTeam);
      }
      nextQuestion();
    }

    function handleAnswer(teamIndex, answer) {
      const q = gameState.questions[gameState.currentQuestion];
      const team = gameState.teams[teamIndex];
      const isCorrect = answer === q.answer;
      const isFastest = !gameState.answeringTeams.length;
      const roundIndex = Math.floor(gameState.currentQuestion / 10);
      
      if (isCorrect) {
        let steps = isFastest ? 2 : 1;
        
        if (isFastest && team.activeEffects?.includes('boost')) {
          steps += 1;
          team.activeEffects = team.activeEffects.filter(e => e !== 'boost');
          showPowerUpUsed(team, powerUpDefs.find(p => p.id === 'boost'), 'Langkah ekstra ditambahkan!');
        }
        
        team.position = Math.min((team.position || 0) + steps, 20);
        team.correctAnswers = (team.correctAnswers || 0) + 1;
        team.streak = (team.streak || 0) + 1;
        team.roundScores[roundIndex] = (team.roundScores[roundIndex] || 0) + steps;
        
        if (isFastest) team.fastestCount = (team.fastestCount || 0) + 1;
        
        checkPowerUpTriggers(team);
        animateTeamMove(teamIndex, steps, true, isFastest);
        showAnswerFeedback(teamIndex, true, isFastest, steps);
        
        gameState.questionAnsweredCorrectly = true;
      } else {
        handleWrongAnswer(teamIndex);
      }
      
      gameState.answeringTeams.push(teamIndex);
      gameState.selectedTeam = null;
      render();
      
      if (isCorrect || gameState.answeringTeams.length >= 3) {
        setTimeout(nextQuestion, 2000);
      }
    }

    function handleWrongAnswer(teamIndex) {
      const team = gameState.teams[teamIndex];
      const roundIndex = Math.floor(gameState.currentQuestion / 10);
      
      if (team.activeEffects?.includes('shield')) {
        team.activeEffects = team.activeEffects.filter(e => e !== 'shield');
        showAnswerFeedback(teamIndex, false, false, 0, true);
      } else if (team.activeEffects?.includes('phoenix')) {
        team.activeEffects = team.activeEffects.filter(e => e !== 'phoenix');
        showAnswerFeedback(teamIndex, false, false, 0, true);
      } else {
        team.position = Math.max((team.position || 0) - 1, 0);
        team.roundScores[roundIndex] = (team.roundScores[roundIndex] || 0) - 1;
        
        if (team.position < 0) team.hadNegative = true;
        team.wrongAnswers = (team.wrongAnswers || 0) + 1;
        team.streak = 0;
        
        animateTeamMove(teamIndex, -1, false, false);
        showAnswerFeedback(teamIndex, false, false, -1);
      }
    }

    function showAnswerFeedback(teamIndex, isCorrect, isFastest, steps, shielded = false) {
      const team = gameState.teams[teamIndex];
      const q = gameState.questions[gameState.currentQuestion];
      
      const options = document.querySelectorAll('.option-btn');
      options.forEach(opt => {
        const letter = opt.dataset.answer;
        if (letter === q.answer) {
          opt.classList.add('border-emerald-400', 'bg-emerald-900/50');
          opt.classList.remove('border-purple-500/50');
        }
      });
      
      let message = '';
      let bgColor = '';
      
      if (shielded) {
        message = `🛡️ ${team.animal} ${team.name} - Efek pelindung aktif!`;
        bgColor = 'bg-blue-600';
      } else if (isCorrect && isFastest) {
        message = `⚡ ${team.animal} ${team.name} - FASTEST! +${steps} steps!`;
        bgColor = 'bg-emerald-600';
      } else if (isCorrect) {
        message = `✓ ${team.animal} ${team.name} - Correct! +${steps} step`;
        bgColor = 'bg-emerald-600';
      } else {
        message = `✗ ${team.animal} ${team.name} - Wrong! ${steps} step`;
        bgColor = 'bg-red-600';
      }
      
      const toast = document.createElement('div');
      toast.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 ${bgColor} text-white px-8 py-4 rounded-xl text-xl font-bold shadow-2xl z-50 bounce-in`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 1800);
    }

    function checkPowerUpTriggers(team) {
      if (team.fastestCount >= 3 && !team.powerUps?.includes('boost')) {
        team.powerUps = team.powerUps || [];
        team.powerUps.push('boost');
        showPowerUpEarned(team, 'boost');
      }
      
      if (team.streak >= 3 && !team.powerUps?.includes('shield')) {
        team.powerUps = team.powerUps || [];
        team.powerUps.push('shield');
        showPowerUpEarned(team, 'shield');
      }
      
      if (team.correctAnswers >= 5 && !team.powerUps?.includes('portal')) {
        team.powerUps = team.powerUps || [];
        team.powerUps.push('portal');
        showPowerUpEarned(team, 'portal');
      }
      
      if (team.fastestCount >= 5 && !team.powerUps?.includes('time')) {
        team.powerUps = team.powerUps || [];
        team.powerUps.push('time');
        showPowerUpEarned(team, 'time');
      }
      
      const roundIndex = Math.floor(gameState.currentQuestion / 10);
      if (roundIndex >= 2) {
        team.hardCorrect = (team.hardCorrect || 0) + 1;
        if (team.hardCorrect >= 3 && !team.powerUps?.includes('phoenix')) {
          team.powerUps = team.powerUps || [];
          team.powerUps.push('phoenix');
          showPowerUpEarned(team, 'phoenix');
        }
      }
    }

    function showPowerUpEarned(team, powerUpId) {
      const pu = powerUpDefs.find(p => p.id === powerUpId);
      if (!pu) return;
      
      const toast = document.createElement('div');
      toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-xl shadow-2xl z-50 bounce-in flex items-center gap-3';
      toast.innerHTML = `
        <span class="text-3xl">${pu.emoji}</span>
        <div>
          <div class="font-bold">${team.animal} earned ${pu.name}!</div>
          <div class="text-sm text-purple-200">${pu.desc}</div>
        </div>
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 2500);
    }

    function usePowerUp(teamIndex, powerUpId) {
      const team = gameState.teams[teamIndex];
      if (!team.powerUps?.includes(powerUpId)) return;
      if (team.usedPowerUps?.includes(powerUpId)) return;
      
      team.usedPowerUps = team.usedPowerUps || [];
      team.activeEffects = team.activeEffects || [];
      
      const pu = powerUpDefs.find(p => p.id === powerUpId);
      
      switch(powerUpId) {
        case 'boost':
          team.usedPowerUps.push('boost');
          team.activeEffects.push('boost');
          showPowerUpUsed(team, pu, 'Aktif untuk jawaban tercepatmu berikutnya!');
          break;
          
        case 'shield':
          team.usedPowerUps.push('shield');
          team.activeEffects.push('shield');
          showPowerUpUsed(team, pu, 'Shield siap menahan pengurangan poin!');
          break;
          
        case 'portal':
          team.usedPowerUps.push('portal');
          showPowerUpUsed(team, pu, 'Pertanyaan dilewati!');
          setTimeout(() => nextQuestion(), 1000);
          break;
          
        case 'dragon':
          showDragonTargetSelection(teamIndex);
          team.usedPowerUps.push('dragon');
          break;
          
        case 'phoenix':
          team.usedPowerUps.push('phoenix');
          team.activeEffects.push('phoenix');
          showPowerUpUsed(team, pu, 'Siap melindungi jawaban salahmu berikutnya!');
          break;
          
        case 'time':
          gameState.timeLeft += 10;
          team.usedPowerUps.push('time');
          showPowerUpUsed(team, pu, '+10 detik ditambahkan!');
          break;
      }
      render();
    }

    function showDragonTargetSelection(attackerIndex) {
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
      modal.innerHTML = `
        <div class="bg-purple-900 rounded-xl p-6 border-2 border-red-500 max-w-md w-full mx-4">
          <h3 class="fantasy-title text-xl text-red-400 mb-4 text-center">💥 Dragon Fire - Choose Target!</h3>
          <div class="space-y-2">
            ${gameState.teams.slice(0, gameState.teamCount)
              .filter((_, i) => i !== attackerIndex)
              .map((team, i) => {
                const actualIndex = i >= attackerIndex ? i + 1 : i;
                return `
                  <button class="dragon-target w-full flex items-center gap-3 bg-purple-800/50 hover:bg-red-900/50 rounded-lg p-3 transition-all" data-target="${actualIndex}">
                    <span class="text-2xl">${team.animal}</span>
                    <span class="flex-1" style="color: ${team.color}">${team.name}</span>
                    <span class="text-emerald-400">${team.position || 0} steps</span>
                  </button>
                `;
              }).join('')}
          </div>
          <button class="cancel-dragon mt-4 w-full bg-gray-600 hover:bg-gray-500 rounded-lg py-2 text-white">Cancel</button>
        </div>
      `;
      document.body.appendChild(modal);
      
      modal.querySelectorAll('.dragon-target').forEach(btn => {
        btn.addEventListener('click', () => {
          const targetIndex = parseInt(btn.dataset.target);
          const targetTeam = gameState.teams[targetIndex];
          
          targetTeam.position = Math.max((targetTeam.position || 0) - 2, 0);
          targetTeam.roundScores[Math.floor(gameState.currentQuestion / 10)] -= 2;
          
          modal.remove();
          
          const toast = document.createElement('div');
          toast.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-600 text-white px-8 py-4 rounded-xl text-xl font-bold shadow-2xl z-50 bounce-in';
          toast.textContent = `💥 ${targetTeam.animal} ${targetTeam.name} hit by Dragon Fire! -2 steps!`;
          document.body.appendChild(toast);
          setTimeout(() => toast.remove(), 2000);
          
          render();
        });
      });
      
      modal.querySelector('.cancel-dragon').addEventListener('click', () => modal.remove());
    }

    function showPowerUpUsed(team, pu, message) {
      const toast = document.createElement('div');
      toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-gold to-yellow-500 text-purple-900 px-6 py-3 rounded-xl shadow-2xl z-50 bounce-in flex items-center gap-3';
      toast.innerHTML = `
        <span class="text-3xl">${pu.emoji}</span>
        <div>
          <div class="font-bold">${team.animal} used ${pu.name}!</div>
          <div class="text-sm">${message}</div>
        </div>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function nextQuestion() {
      clearInterval(gameState.timer);
      gameState.selectedTeam = null;
      gameState.answeringTeams = [];
      gameState.questionAnsweredCorrectly = false;
      
      const currentRound = Math.floor(gameState.currentQuestion / 10);
      const nextRound = Math.floor((gameState.currentQuestion + 1) / 10);
      
      if (nextRound > currentRound && gameState.currentQuestion < 49) {
        showRoundRecap(currentRound);
        
        const roundScores = gameState.teams.slice(0, gameState.teamCount).map((t, i) => ({
          index: i,
          score: t.roundScores?.[currentRound] || 0
        }));
        roundScores.sort((a, b) => b.score - a.score);
        
        if (roundScores[0].score > 0) {
          const winner = gameState.teams[roundScores[0].index];
          if (!winner.powerUps?.includes('dragon')) {
            winner.powerUps = winner.powerUps || [];
            winner.powerUps.push('dragon');
            showPowerUpEarned(winner, 'dragon');
          }
        }
        
        return; 
      }
      
      gameState.currentQuestion++;
      
      if (gameState.currentQuestion >= 50 || gameState.teams.some(t => (t.position || 0) >= 20)) {
        gameState.screen = 'victory';
        render();
        setTimeout(spawnConfetti, 500);
        return;
      }
      
      gameState.currentRound = Math.floor(gameState.currentQuestion / 10) + 1;
      render();
      startTimer();
    }

    function showRoundRecap(roundIndex) {
      const roundScores = gameState.teams.slice(0, gameState.teamCount)
        .map((t, i) => ({
          index: i,
          team: t,
          score: t.roundScores?.[roundIndex] || 0,
          position: t.position || 0
        }))
        .sort((a, b) => b.score - a.score);
      
      const roundName = gameState.roundNames[roundIndex];
      
      const modal = document.createElement('div');
      modal.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50';
      modal.innerHTML = `
        <div class="bg-gradient-to-br from-purple-900 to-indigo-900 rounded-2xl p-8 border-2 border-gold max-w-2xl w-full mx-4 shadow-2xl">
          <h2 class="fantasy-title text-4xl text-center text-gold mb-2">${roundName} Recap</h2>
          <p class="text-center text-purple-300 mb-6">${getRoundEmoji(roundIndex)} ${getRoundDescription(roundIndex)}</p>
          
          <div class="space-y-2 mb-6">
            ${roundScores.map((entry, rank) => `
              <div class="flex items-center gap-4 bg-purple-800/50 rounded-lg p-3 border border-purple-500/30">
                <span class="text-2xl font-bold ${rank === 0 ? 'text-gold' : rank === 1 ? 'text-gray-300' : 'text-amber-600'}">#${rank + 1}</span>
                <span class="text-2xl">${entry.team.animal}</span>
                <span class="flex-1" style="color: ${entry.team.color}">
                  <span class="font-bold">${entry.team.name}</span>
                  <span class="text-purple-300 text-sm ml-2">${entry.score} points</span>
                </span>
                <span class="text-emerald-400 font-bold">Position: ${entry.position}</span>
              </div>
            `).join('')}
          </div>
          
          <button 
            id="continue-recap-btn"
            class="w-full bg-gradient-to-r from-gold to-yellow-500 hover:from-yellow-500 hover:to-orange-500 text-purple-900 font-bold py-3 px-6 rounded-lg transition-all transform hover:scale-105"
          >
            Continue to Next Round →
          </button>
        </div>
      `;
      
      document.body.appendChild(modal);
      
      modal.querySelector('#continue-recap-btn').addEventListener('click', () => {
        modal.remove();
        gameState.currentQuestion++;
        
        if (gameState.currentQuestion >= 50 || gameState.teams.some(t => (t.position || 0) >= 20)) {
          gameState.screen = 'victory';
          render();
          setTimeout(spawnConfetti, 500);
          return;
        }
        
        gameState.currentRound = Math.floor(gameState.currentQuestion / 10) + 1;
        render();
        startTimer();
      });
    }

    function togglePause() {
      if (gameState.isPaused) {
        gameState.isPaused = false;
        startTimer(true);
      } else {
        gameState.isPaused = true;
        clearInterval(gameState.timer);
      }
      render();
    }

    // ===== EVENT LISTENERS =====
    function attachEventListeners() {
      document.getElementById('start-tutorial-btn')?.addEventListener('click', () => {
        gameState.screen = 'import';
        render();
      });
      
      document.getElementById('use-sample-btn')?.addEventListener('click', () => {
        gameState.questions = getSampleQuestions();
        document.getElementById('import-status').textContent = `✓ Loaded 50 sample questions!`;
        document.getElementById('import-status').className = 'mt-4 text-center text-sm text-emerald-400';
        document.getElementById('import-status').classList.remove('hidden');
        
        setTimeout(() => {
          gameState.screen = 'powerups';
          render();
        }, 1000);
      });
      
      document.getElementById('import-btn')?.addEventListener('click', () => {
        const input = document.getElementById('aiken-input').value;
        const questions = parseAIKEN(input);
        
        if (questions.length < 10) {
          document.getElementById('import-status').textContent = `⚠️ Need at least 10 questions. Found: ${questions.length}`;
          document.getElementById('import-status').className = 'mt-4 text-center text-sm text-red-400';
          document.getElementById('import-status').classList.remove('hidden');
          return;
        }
        
        gameState.questions = questions.slice(0, 50);
        document.getElementById('import-status').textContent = `✓ Imported ${gameState.questions.length} questions!`;
        document.getElementById('import-status').className = 'mt-4 text-center text-sm text-emerald-400';
        document.getElementById('import-status').classList.remove('hidden');
        
        setTimeout(() => {
          gameState.screen = 'powerups';
          render();
        }, 1000);
      });
      
      const fileDropZone = document.getElementById('file-drop-zone');
      const fileInput = document.getElementById('file-upload');
      
      if (fileDropZone && fileInput) {
        fileDropZone.addEventListener('click', () => fileInput.click());
        
        fileDropZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          fileDropZone.classList.add('bg-purple-900/70', 'border-purple-400');
        });
        
        fileDropZone.addEventListener('dragleave', () => {
          fileDropZone.classList.remove('bg-purple-900/70', 'border-purple-400');
        });
        
        fileDropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          fileDropZone.classList.remove('bg-purple-900/70', 'border-purple-400');
          
          const files = e.dataTransfer.files;
          if (files.length > 0) {
            handleFileUpload(files[0]);
          }
        });
        
        fileInput.addEventListener('change', (e) => {
          if (e.target.files.length > 0) {
            handleFileUpload(e.target.files[0]);
          }
        });
      }
      
      function handleFileUpload(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const content = e.target.result;
          document.getElementById('aiken-input').value = content;
          
          const questions = parseAIKEN(content);
          
          if (questions.length < 10) {
            document.getElementById('import-status').textContent = `⚠️ Need at least 10 questions. Found: ${questions.length}`;
            document.getElementById('import-status').className = 'mt-4 text-center text-sm text-red-400';
            document.getElementById('import-status').classList.remove('hidden');
            return;
          }
          
          gameState.questions = questions.slice(0, 50);
          document.getElementById('import-status').textContent = `✓ Loaded ${gameState.questions.length} questions from file!`;
          document.getElementById('import-status').className = 'mt-4 text-center text-sm text-emerald-400';
          document.getElementById('import-status').classList.remove('hidden');
          
          setTimeout(() => {
            gameState.screen = 'powerups';
            render();
          }, 1000);
        };
        reader.readAsText(file);
      }
      
      document.getElementById('continue-to-setup')?.addEventListener('click', () => {
        gameState.screen = 'setup';
        initializeTeams();
        render();
      });
      
      document.getElementById('team-count')?.addEventListener('change', (e) => {
        gameState.teamCount = parseInt(e.target.value);
        document.getElementById('team-inputs').innerHTML = 
          Array.from({length: gameState.teamCount}, (_, i) => renderTeamInput(i)).join('');
        document.getElementById('track-preview').innerHTML = renderTrackPreview();
        attachTeamInputListeners();
      });
      
      document.getElementById('timer-select')?.addEventListener('change', (e) => {
        const customInput = document.getElementById('custom-timer');
        if (e.target.value === 'custom') {
          customInput.classList.remove('hidden');
        } else {
          customInput.classList.add('hidden');
          gameState.timerDuration = parseInt(e.target.value);
        }
      });
      
      document.getElementById('custom-timer')?.addEventListener('change', (e) => {
        gameState.timerDuration = Math.min(Math.max(parseInt(e.target.value) || 30, 10), 600);
      });
      
      document.getElementById('start-quest-btn')?.addEventListener('click', () => {
        const teamInputs = document.querySelectorAll('.team-name-input');
        teamInputs.forEach((input, i) => {
          gameState.teams[i].name = input.value || `Team ${i + 1}`;
        });
        
        gameState.currentQuestion = 0;
        gameState.currentRound = 1;
        gameState.selectedTeam = null;
        gameState.answeringTeams = [];
        gameState.teamAnswerCount = {}; 
        gameState.teams.forEach(t => {
          t.position = 0;
          t.correctAnswers = 0;
          t.wrongAnswers = 0;
          t.fastestCount = 0;
          t.streak = 0;
          t.powerUps = [];
          t.usedPowerUps = [];
          t.activeEffects = [];
          t.roundScores = [0, 0, 0, 0, 0];
          t.hadNegative = false;
          t.hardCorrect = 0;
        });
        
        if (!isMusicPlaying) toggleMusic();
        
        gameState.screen = 'game';
        render();
        startTimer();
      });
      
      attachTeamInputListeners();
      
      document.querySelectorAll('.team-buzzer').forEach(btn => {
        btn.addEventListener('click', () => {
          const teamIndex = parseInt(btn.dataset.team);
          if (!gameState.answeringTeams.includes(teamIndex)) {
            gameState.selectedTeam = teamIndex;
            gameState.teamAnswerCount[teamIndex] = (gameState.teamAnswerCount[teamIndex] || 0) + 1;
            render();
          }
        });
      });
      
      document.getElementById('randomize-team-btn')?.addEventListener('click', selectRandomTeam);
      
      document.getElementById('pause-btn')?.addEventListener('click', togglePause);
      document.getElementById('music-toggle-btn')?.addEventListener('click', toggleMusic);
      
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (gameState.selectedTeam !== null) {
            handleAnswer(gameState.selectedTeam, btn.dataset.answer);
          }
        });
      });
      
      document.getElementById('continue-quest-btn')?.addEventListener('click', () => {
        nextQuestion();
      });
      
      document.querySelectorAll('.power-up:not(.locked):not(.used)').forEach(btn => {
        btn.addEventListener('click', () => {
          if (gameState.selectedTeam !== null) {
            usePowerUp(gameState.selectedTeam, btn.dataset.powerup);
          }
        });
      });
      
      document.getElementById('play-again-btn')?.addEventListener('click', () => {
        gameState.screen = 'import';
        gameState.questions = [];
        initializeTeams();
        render();
      });
    }

    function attachTeamInputListeners() {
      document.querySelectorAll('.team-name-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const index = parseInt(e.target.dataset.index);
          gameState.teams[index].name = e.target.value;
        });
      });
      
      document.querySelectorAll('.team-animal-select').forEach(select => {
        select.addEventListener('change', (e) => {
          const index = parseInt(e.target.dataset.index);
          gameState.teams[index].animal = e.target.value;
          document.getElementById('track-preview').innerHTML = renderTrackPreview();
        });
      });
      
      document.querySelectorAll('.team-color-input').forEach(input => {
        input.addEventListener('input', (e) => {
          const index = parseInt(e.target.dataset.index);
          gameState.teams[index].color = e.target.value;
          document.getElementById('track-preview').innerHTML = renderTrackPreview();
        });
      });
    }

    // ===== ELEMENT SDK =====
    window.elementSdk?.init({
      defaultConfig,
      onConfigChange: async (newConfig) => {
        config = { ...defaultConfig, ...newConfig };
        const titleEl = document.querySelector('.fantasy-title.text-5xl');
        if (titleEl) {
          titleEl.textContent = config.game_title;
        }
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['game_title', config.game_title || defaultConfig.game_title]
      ])
    });

    // ===== INITIALIZE =====
    initializeTeams();
    render();
  </script>
 </body>
</html>
