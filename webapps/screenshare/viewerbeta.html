<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer - Screen Share</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #2c3e50; padding-top: 30px; color: white; }
        .video-box { border: 2px solid #34495e; background: #000; border-radius: 8px; width: 100%; min-height: 300px; }
        .card-custom { background-color: #34495e; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
            <h2 class="mb-4">Tonton Layar Host</h2>

            <div class="card card-custom p-4 shadow mb-4">
                <div class="d-flex justify-content-center">
                    <input type="text" id="target-id" class="form-control form-control-lg me-2 w-50" placeholder="Masukkan ID Host (Misal: 1234)">
                    <button id="tontonBtn" class="btn btn-success btn-lg px-4" onclick="tontonLayar()">Tonton</button>
                </div>
                <small class="text-warning mt-2 d-none" id="mobileWarning">Jika layar hitam, klik tombol PLAY (►) di dalam kotak video.</small>
            </div>

            <video id="remoteVideo" autoplay playsinline class="video-box mb-3"></video>
            
            <button class="btn btn-outline-light w-100" onclick="bukaFullscreen('remoteVideo')">
                <i class="fas fa-expand"></i> Layar Penuh (Fullscreen)
            </button>
        </div>
    </div>
</div>

<script>
    // Penonton tidak butuh ID khusus, cukup buat koneksi Peer biasa
    const peer = new Peer({
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    // Menerima panggilan video dari Host
    peer.on('call', (call) => {
        call.answer(); // Langsung jawab
        
        call.on('stream', (remoteStream) => {
            const videoRemote = document.getElementById('remoteVideo');
            videoRemote.srcObject = remoteStream;
            
            // Penanganan khusus untuk browser HP (Android/iOS)
            videoRemote.play().catch((error) => {
                console.warn("Autoplay diblokir:", error);
                videoRemote.controls = true; // Munculkan tombol play
                document.getElementById('mobileWarning').classList.remove('d-none');
            });
        });
    });

    function tontonLayar() {
        const targetId = document.getElementById('target-id').value.trim();
        const tontonBtn = document.getElementById('tontonBtn');

        if (!targetId) {
            alert("Silakan masukkan ID Host!");
            return;
        }

        // Hubungkan ke Host
        const conn = peer.connect(targetId);
        
        conn.on('open', () => {
            // Minta Host untuk mengirimkan video
            conn.send('MINTA_STREAM');
            
            tontonBtn.textContent = "Menghubungkan...";
            setTimeout(() => { tontonBtn.textContent = "Tonton"; }, 3000);
        });
    }

    function bukaFullscreen(elemenId) {
        const elemen = document.getElementById(elemenId);
        if (elemen.requestFullscreen) elemen.requestFullscreen();
        else if (elemen.webkitRequestFullscreen) elemen.webkitRequestFullscreen();
    }
</script>
</body>
</html>
