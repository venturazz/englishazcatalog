<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer Dashboard - ProShare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh;
            background-image: radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .form-control-custom { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 10px; }
        .form-control-custom:focus { background: rgba(15, 23, 42, 0.8); border-color: #10b981; color: white; box-shadow: none; }
        .btn-success-custom { background: #10b981; color: white; border: none; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-success-custom:hover { background: #059669; color: white; transform: scale(1.02); }
        
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        /* Chatbox Styles */
        .chat-container { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; border: 1px solid rgba(255,255,255,0.05); scrollbar-width: thin; }
        .chat-bubble { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 15px; margin-bottom: 8px; font-size: 0.9rem; width: fit-content; max-width: 90%; word-break: break-word; }
        .chat-bubble.me { background: rgba(16, 185, 129, 0.3); margin-left: auto; border: 1px solid rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark pt-3 pb-3 mb-4 border-bottom border-secondary border-opacity-25">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fas fa-satellite-dish fs-4 me-3" style="color: #10b981;"></i>
                <span class="fs-5 fw-bold tracking-wide">ProShare <span class="text-secondary fw-normal">| Viewer Panel</span></span>
            </a>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <div class="row g-4 flex-column-reverse flex-lg-row">
            
            <div class="col-lg-8">
                <div class="glass-card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0 text-secondary"><i class="fas fa-desktop me-2"></i>Host Screen</h5>
                        <button class="btn btn-sm btn-outline-light" onclick="toggleFullscreen('remoteVideo')">
                            <i class="fas fa-expand me-1"></i> Fullscreen
                        </button>
                    </div>

                    <div class="video-wrapper">
                        <div id="playOverlay" class="position-absolute top-50 start-50 translate-middle text-center d-none" style="z-index: 10;">
                            <i class="fas fa-play-circle text-white mb-2" style="font-size: 4rem; cursor: pointer;"></i>
                            <p class="fs-5 text-white m-0 fw-bold">Tap to Play</p>
                        </div>
                        <video id="remoteVideo" autoplay playsinline></video>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="glass-card p-4 h-100 d-flex flex-column">
                    
                    <div id="join-section" class="mb-4 p-4 rounded-4" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);">
                        <h5 class="fw-bold mb-4 text-center"><i class="fas fa-door-open me-2 text-success"></i>Join a Room</h5>

                        <div class="mb-4 text-start">
                            <label for="viewer-name" class="form-label text-light fw-bold mb-2" style="font-size: 0.9rem;">
                                <span class="badge bg-secondary me-1">1</span> What is your name?
                            </label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-transparent border-end-0" style="border-color: rgba(255,255,255,0.1);">
                                    <i class="fas fa-user text-secondary"></i>
                                </span>
                                <input type="text" id="viewer-name" class="form-control form-control-custom border-start-0 fs-6" placeholder="e.g., Jane Doe">
                            </div>
                        </div>

                        <div class="mb-4 text-start">
                            <label for="target-id" class="form-label text-light fw-bold mb-2" style="font-size: 0.9rem;">
                                <span class="badge bg-secondary me-1">2</span> Enter Host ID
                            </label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-transparent border-end-0" style="border-color: rgba(255,255,255,0.1);">
                                    <i class="fas fa-hashtag text-secondary"></i>
                                </span>
                                <input type="text" id="target-id" class="form-control form-control-custom border-start-0 fs-6" placeholder="e.g., 4921">
                            </div>
                            <div class="form-text mt-2" style="color: #94a3b8; font-size: 0.8rem;">
                                <i class="fas fa-info-circle me-1"></i> Ask the Host for their 4-digit code.
                            </div>
                        </div>

                        <button id="watchBtn" class="btn btn-success-custom btn-lg w-100 mt-2" onclick="joinAndWatch()">
                            <i class="fas fa-sign-in-alt me-2"></i> Connect to Host
                        </button>
                    </div>

                    <hr class="border-secondary opacity-25">

                    <h5 class="fw-bold mb-3"><i class="fas fa-comments me-2 text-warning"></i>Live Chat</h5>
                    <div class="chat-container mb-3 flex-grow-1" id="chat-box">
                        <div class="text-center text-muted small mt-2">Please join the room first...</div>
                    </div>
                    
                    <form id="chat-form" onsubmit="sendViewerMessage(event)">
                        <div class="input-group">
                            <input type="text" id="chat-input" class="form-control form-control-custom" placeholder="Type a message..." autocomplete="off" disabled>
                            <button class="btn btn-success" type="submit" id="chat-btn" disabled><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script>
        const peer = new Peer({ config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }});
        
        let hostConn = null; 
        let myName = "";

        // =====================================
        // RECEIVING VIDEO FROM HOST
        // =====================================
        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (remoteStream) => {
                const videoRemote = document.getElementById('remoteVideo');
                videoRemote.srcObject = remoteStream;
                
                videoRemote.play().catch((error) => {
                    videoRemote.controls = true;
                    document.getElementById('playOverlay').classList.remove('d-none');
                });
            });
        });

        // =====================================
        // JOIN ROOM FUNCTION
        // =====================================
        function joinAndWatch() {
            const targetId = document.getElementById('target-id').value.trim();
            myName = document.getElementById('viewer-name').value.trim();
            const btn = document.getElementById('watchBtn');

            if (!myName) return alert("Please enter your Name!");
            if (!targetId) return alert("Please enter the Host ID!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Connecting...';
            btn.disabled = true;

            hostConn = peer.connect(targetId);
            
            hostConn.on('open', () => {
                btn.innerHTML = '<i class="fas fa-check-circle me-2"></i> Connected';
                
                hostConn.send({ type: 'REQUEST_STREAM', name: myName });

                document.getElementById('chat-input').disabled = false;
                document.getElementById('chat-btn').disabled = false;
                document.getElementById('chat-box').innerHTML = '<div class="text-center text-success small mt-2">You are connected to the chat.</div>';

                document.getElementById('viewer-name').disabled = true;
                document.getElementById('target-id').disabled = true;
            });

            hostConn.on('data', (data) => {
                if (data.type === 'CHAT' && data.sender !== myName) {
                    printMessage(data.sender, data.text, data.sender === 'Host (You)' || data.sender === 'Host (Anda)');
                }
            });
        }

        // =====================================
        // SENDING MESSAGE (VIEWER)
        // =====================================
        function sendViewerMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            
            if (!text || !hostConn) return;

            hostConn.send({ type: 'CHAT', sender: myName, text: text });
            printMessage('You', text, false, true);
            input.value = '';
        }

        // =====================================
        // SECURE UI UTILITIES (XSS Prevention)
        // =====================================
        function printMessage(sender, text, isFromHost = false, isMe = false) {
            const box = document.getElementById('chat-box');
            
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            if (isMe) bubble.classList.add('me');
            if (isFromHost && !isMe) bubble.classList.add('host');

            let nameColor = 'text-info';
            if (isFromHost) nameColor = 'text-warning';
            if (isMe) nameColor = 'text-light';

            const displayName = isFromHost ? 'Host' : sender;

            const nameStr = document.createElement('strong');
            nameStr.className = `${nameColor} d-block`;
            nameStr.style.fontSize = '0.75rem';
            nameStr.textContent = displayName;

            const textNode = document.createTextNode(" " + text);

            bubble.appendChild(nameStr);
            bubble.appendChild(textNode);
            box.appendChild(bubble);

            box.scrollTop = box.scrollHeight;
        }

        function toggleFullscreen(elementId) {
            const el = document.getElementById(elementId);
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
