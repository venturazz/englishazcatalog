 <body class="h-full">
  <div id="app" class="w-full h-full flex flex-col items-center justify-center overflow-auto" style="background: linear-gradient(135deg, #e0f2fe 0%, #f0fdfa 40%, #ffffff 100%); font-family: 'DM Sans', sans-serif;">
   <header class="text-center mb-6 fade-up fade-up-d1">
    <h1 id="welcomeText" class="text-2xl md:text-3xl font-bold" style="color: #0c4a6e;">Selamat Datang / Welcome</h1>
    <div class="mt-2 w-16 h-1 mx-auto rounded-full" style="background: linear-gradient(90deg, #0284c7, #14b8a6);"></div>
   </header>
   <main class="w-full max-w-sm mx-auto px-4 fade-up fade-up-d2">
    <div class="bg-white rounded-2xl p-8 text-center" style="box-shadow: 0 8px 40px rgba(2,132,199,0.12), 0 1.5px 6px rgba(0,0,0,0.04);">
     <p id="cardTitle" class="text-sm font-medium tracking-wide mb-4" style="color: #64748b;">Nomor Antrian Anda / Your Queue Number:</p>
     <div class="text-5xl mb-3">
      ✅
     </div>
     <div id="queueNumber" class="pulse-number font-bold leading-none my-4" style="font-family: 'Space Mono', monospace; font-size: 72px; color: #0c4a6e; letter-spacing: 0.05em;"></div>
     <div class="w-full h-px my-5" style="background: linear-gradient(90deg, transparent, #0284c7, #14b8a6, transparent);"></div>
     <p class="text-xs" style="color: #94a3b8;">Waktu Registrasi:</p>
     <p id="regTime" class="text-sm font-medium mt-1" style="color: #334155;"></p>
    </div>
   </main>
   <footer id="footerArea" class="mt-8 text-center px-6 fade-up fade-up-d4">
    <p id="footerNote" class="text-xs" style="color: #94a3b8;">Tunjukkan nomor ini kepada petugas. / Show this number to the officer.</p><button id="resetAllBtn" class="mt-4 text-xs px-4 py-2 rounded bg-orange-100 text-orange-600 hover:bg-orange-200 transition font-medium">Reset Antrian / Reset Queue</button>
    <div id="adminPanel" class="mt-6 hidden">
     <div class="bg-white rounded-lg p-4 inline-block" style="box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
      <p class="text-xs font-medium mb-3" style="color: #0c4a6e;">Masukkan Kode Admin / Enter Admin Code:</p>
      <div class="flex gap-2">
       <input id="adminCode" type="password" placeholder="••••" class="text-sm px-3 py-2 rounded border" style="border-color: #cbd5e1; width: 120px;"> <button id="submitAdminCode" class="text-xs px-4 py-2 rounded font-medium transition" style="background: #0284c7; color: white;">Konfirmasi / Confirm</button> <button id="cancelAdminCode" class="text-xs px-4 py-2 rounded font-medium transition" style="background: #e2e8f0; color: #64748b;">Batal / Cancel</button>
      </div>
      <p id="adminMsg" class="text-xs mt-2" style="color: #dc2626; display: none;"></p>
     </div>
    </div>
   </footer>
  </div>
  <script>
// Firebase Configuration
// ⚠️ GANTI DENGAN KONFIGURASI FIREBASE ANDA SENDIRI
 const firebaseConfig = {
    apiKey: "AIzaSyBUG9x02y-xS4aemmvOVUIgQ-t6HsGgG6o",
    authDomain: "queuenumber-62b79.firebaseapp.com",
    projectId: "queuenumber-62b79",
    storageBucket: "queuenumber-62b79.firebasestorage.app",
    messagingSenderId: "573068020787",
    appId: "1:573068020787:web:06decd79a0dfdd0859e746",
    measurementId: "G-M8L7PVXTC2"
  };

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let myQueueRecord = null;
let allQueueData = [];

// Generate device fingerprint that works across browsers
function getDeviceFingerprint() {
  const navigator_ua = navigator.userAgent;
  const navigator_lang = navigator.language;
  const screen_res = screen.width + 'x' + screen.height;
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  
  const fingerprint = navigator_ua + '|' + navigator_lang + '|' + screen_res + '|' + timezone;
  
  let hash = 0;
  for (let i = 0; i < fingerprint.length; i++) {
    const char = fingerprint.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return 'device_' + Math.abs(hash).toString(36);
}

// Listen to queue data changes
function listenToQueueData() {
  database.ref('queues').on('value', (snapshot) => {
    const data = snapshot.val();
    allQueueData = data ? Object.values(data) : [];
    
    // Find this visitor's queue record
    const visitorId = localStorage.getItem('visitor_id');
    myQueueRecord = allQueueData.find(record => record.visitor_id === visitorId);
    
    if (myQueueRecord) {
      const queueNum = String(myQueueRecord.queue_number).padStart(3, '0');
      document.getElementById('queueNumber').textContent = queueNum;
      const d = new Date(myQueueRecord.registration_time);
      document.getElementById('regTime').textContent = d.toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) + ', ' + d.toLocaleTimeString('id-ID');
    }
  });
}

async function initializeQueue() {
  // Listen to data changes
  listenToQueueData();
  
  // Wait for initial data load
  await new Promise(resolve => setTimeout(resolve, 1500));
  
  const deviceId = getDeviceFingerprint();
  const storedVisitorId = localStorage.getItem('visitor_id');
  
  let visitorRecord = null;
  
  if (storedVisitorId) {
    visitorRecord = allQueueData.find(r => r.visitor_id === storedVisitorId);
  }
  
  if (visitorRecord) {
    // Returning visitor - display their existing number
    const queueNum = String(visitorRecord.queue_number).padStart(3, '0');
    document.getElementById('queueNumber').textContent = queueNum;
    const d = new Date(visitorRecord.registration_time);
    document.getElementById('regTime').textContent = d.toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) + ', ' + d.toLocaleTimeString('id-ID');
    myQueueRecord = visitorRecord;
  } else {
    // New visitor - create a queue record
    const visitorId = deviceId;
    localStorage.setItem('visitor_id', visitorId);
    
    // Calculate next queue number
    let nextNumber = 1;
    if (allQueueData && allQueueData.length > 0) {
      const queueNumbers = allQueueData.map(r => r.queue_number).filter(n => typeof n === 'number');
      if (queueNumbers.length > 0) {
        nextNumber = Math.max(...queueNumbers) + 1;
      }
    }
    
    document.getElementById('queueNumber').textContent = '...';
    
    const queueKey = database.ref('queues').push().key;
    
    try {
      await database.ref('queues/' + queueKey).set({
        visitor_id: visitorId,
        queue_number: nextNumber,
        registration_time: new Date().toISOString()
      });
    } catch (error) {
      console.error('Failed to create queue record:', error);
      document.getElementById('queueNumber').textContent = 'Erro';
    }
  }
}

// Initialize queue system
initializeQueue();

// Admin code for reset
const ADMIN_CODE = '1234';

// Reset button - show admin panel
document.getElementById('resetAllBtn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('adminPanel').classList.toggle('hidden');
  if (!document.getElementById('adminPanel').classList.contains('hidden')) {
    document.getElementById('adminCode').focus();
  }
});

// Submit admin code
document.getElementById('submitAdminCode').addEventListener('click', async (e) => {
  e.preventDefault();
  const code = document.getElementById('adminCode').value;
  const msgEl = document.getElementById('adminMsg');
  
  if (code === ADMIN_CODE) {
    // Correct code - proceed with reset
    document.getElementById('submitAdminCode').disabled = true;
    document.getElementById('submitAdminCode').textContent = 'Menghapus... / Deleting...';
    msgEl.style.display = 'none';
    
    try {
      // Delete all queue records from Firebase
      await database.ref('queues').remove();
      
      // Wait for deletion to complete
      await new Promise(resolve => setTimeout(resolve, 1000));
      
      // Clear local storage
      localStorage.removeItem('visitor_id');
      
      // Force data refresh
      allQueueData = [];
      myQueueRecord = null;
      msgEl.textContent = 'Reset berhasil! / Reset successful!';
      msgEl.style.color = '#16a34a';
      msgEl.style.display = 'block';
      
      // Close panel and reload after confirmation
      setTimeout(() => {
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('adminCode').value = '';
        document.getElementById('submitAdminCode').disabled = false;
        document.getElementById('submitAdminCode').textContent = 'Konfirmasi / Confirm';
        msgEl.style.color = '#dc2626';
        location.reload();
      }, 2000);
    } catch (error) {
      console.error('Reset failed:', error);
      msgEl.textContent = 'Gagal / Failed. Coba lagi / Try again.';
      msgEl.style.display = 'block';
      document.getElementById('submitAdminCode').disabled = false;
      document.getElementById('submitAdminCode').textContent = 'Konfirmasi / Confirm';
    }
  } else {
    // Wrong code
    msgEl.textContent = 'Kode salah / Wrong code. Coba lagi / Try again.';
    msgEl.style.display = 'block';
    document.getElementById('adminCode').value = '';
    document.getElementById('adminCode').focus();
  }
});

// Cancel button
document.getElementById('cancelAdminCode').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('adminCode').value = '';
  document.getElementById('adminMsg').style.display = 'none';
});

// Allow Enter key to submit admin code
document.getElementById('adminCode').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('submitAdminCode').click();
  }
});

// Simple config without Element SDK
const defaultConfig = {
  welcome_text: 'Selamat Datang / Welcome',
  card_title: 'Nomor Antrian Anda / Your Queue Number:',
  footer_note: 'Tunjukkan nomor ini kepada petugas. / Show this number to the officer.',
  primary_color: '#0c4a6e',
  accent_color: '#0284c7',
  bg_color: '#ffffff',
  text_color: '#334155',
  muted_color: '#94a3b8',
  font_family: 'DM Sans',
  font_size: 16
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('welcomeText').textContent = c.welcome_text;
  document.getElementById('welcomeText').style.color = c.primary_color;
  document.getElementById('cardTitle').textContent = c.card_title;
  document.getElementById('footerNote').textContent = c.footer_note;
  document.getElementById('queueNumber').style.color = c.primary_color;
  document.getElementById('regTime').style.color = c.text_color;
  document.getElementById('footerNote').style.color = c.muted_color;
  const font = c.font_family + ", 'DM Sans', sans-serif";
  document.getElementById('app').style.fontFamily = font;
  const bs = c.font_size;
  document.getElementById('welcomeText').style.fontSize = (bs * 1.75) + 'px';
  document.getElementById('cardTitle').style.fontSize = (bs * 0.85) + 'px';
  document.getElementById('regTime').style.fontSize = (bs * 0.9) + 'px';
  document.getElementById('footerNote').style.fontSize = (bs * 0.75) + 'px';
}

// Apply default config on load
applyConfig(defaultConfig);
</script>
